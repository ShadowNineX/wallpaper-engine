name: Test and deploy

on:
  push:
  workflow_dispatch:

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage
        run: bun run test:run --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build package
        run: bun run build

      - name: Setup Node for npm publish
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Copy README into package
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: cp README.md packages/wallpaper-engine/README.md

      - name: Publish to npm
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npx --yes npm@latest publish --provenance --access public
        working-directory: packages/wallpaper-engine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
